<!DOCTYPE html>
<html lang="pt-BR">
<head>

<body class="bg-green-50 min-h-screen">

            <span class="text-3xl">🥗</span>

            </div>
        </div>
    </header>

    <nav class="bg-white shadow-sm sticky top-[72px] z-10">
        <div class="max-w-md mx-auto flex">
            <button class="flex-1 py-3 text-sm font-semibold text-green-700 border-b-2 border-green-600">
                🛍 Ofertas
            </button>
            <button class="flex-1 py-3 text-sm font-semibold text-gray-500 border-b-2 border-transparent">
                ➕ Publicar Oferta
            </button>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4">
